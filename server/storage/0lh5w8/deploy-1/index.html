<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaticHub 部署测试 #2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 60px;
            max-width: 800px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            font-size: 3em;
            margin-bottom: 20px;
            text-align: center;
        }

        .emoji {
            font-size: 4em;
            text-align: center;
            margin-bottom: 30px;
        }

        .status-list {
            list-style: none;
            margin: 30px 0;
        }

        .status-list li {
            padding: 15px;
            margin: 10px 0;
            background: #f0f4ff;
            border-radius: 10px;
            font-size: 1.2em;
        }

        .success {
            color: #059669;
            font-weight: bold;
        }

        .info {
            background: #e0e7ff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }

        .info h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .info p {
            line-height: 1.8;
            color: #4b5563;
        }

        .timestamp {
            text-align: center;
            margin-top: 30px;
            color: #9ca3af;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚀</div>
        <h1>StaticHub 测试成功！</h1>

        <ul class="status-list">
            <li><span class="success">✓</span> 服务器运行正常</li>
            <li><span class="success">✓</span> 文件上传成功</li>
            <li><span class="success">✓</span> 静态资源服务正常</li>
            <li><span class="success">✓</span> 域名路由正常</li>
        </ul>

        <div class="info">
            <h2>📦 关于 StaticHub</h2>
            <p>
                StaticHub 是一个为前端开发者设计的静态网站发布平台，类似于 Surge 和 GitHub Pages。
                使用一条命令即可部署静态网站，支持自定义域名、版本管理和配置选项。
            </p>
        </div>

        <div class="timestamp">
            部署时间: <span id="time"></span>
        </div>
    </div>

    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
