name: Install Scripts

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-installers:
    name: Validate installer scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate install.sh syntax and help
        run: |
          sh -n scripts/install.sh
          sh scripts/install.sh --help | grep -q "Install target (default: cli)"
          grep -q "statichub version" scripts/install.sh
          grep -q "statichub-server version" scripts/install.sh

      - name: Validate install.ps1 content
        run: |
          grep -q "Install statichub only" scripts/install.ps1
          grep -q "statichub version" scripts/install.ps1
          grep -q "statichub-server version" scripts/install.ps1
